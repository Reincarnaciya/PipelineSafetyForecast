<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Прогнозы утечек</title>
    <style>
        .container {
            max-width: 800px;
            margin: 20px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Прогнозы утечек</h1>
    <form method="get">
        <label>С: <input name="start" th:value="${#temporals.format(start, 'yyyy-MM-dd\'T\'HH:mm')}"
                         type="datetime-local"></label>
        <label>По: <input name="end" th:value="${#temporals.format(end, 'yyyy-MM-dd\'T\'HH:mm')}" type="datetime-local"></label>
        <button type="submit">Показать</button>
    </form>

    <table>
        <thead>
        <tr>
            <th>Датчик</th>
            <th>Время</th>
            <th>Вероятность утечки</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${predictions}">
            <td th:text="${p.sensorId}">sensor-001</td>
            <td th:text="${#temporals.format(p.timestamp, 'dd.MM.yyyy HH:mm')}">2023-10-01 12:00</td>
            <td th:text="${#numbers.formatDecimal(p.leakProbability, 1, 2)}">0.85</td>
        </tr>
        </tbody>
    </table>

    <canvas height="200" id="chart" width="400"></canvas>

    <!--<script>
        const ctx = document.getElementById('chart').getContext('2d');
        const data = {
            labels: [[${#temporals.arrayFormat(predictions.![timestamp], 'dd.MM HH:mm'
        )
        }]],
        datasets: [{
            label: 'Вероятность утечки',
            data: [[${predictions.![leakProbability]}]],
            borderColor: 'rgb(255, 99, 132)',
            tension: 0.1
        }]
        }
        ;

        new Chart(ctx, {
            type: 'line',
            data: data,
            options: {responsive: true}
        });
    </script>-->
</div>
</body>
</html>
