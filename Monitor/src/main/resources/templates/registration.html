<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org" lang="ru">
<head>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
<div class="container">
    <h1>Регистрация</h1>
    <form th:action="@{/registration}" method="POST" th:object="${form}">
            <div th:if="${errors}" class="alert alert-error">
                <ul>
                    <li th:each="error : ${errors}" th:text="${error.defaultMessage}"></li>
                </ul>
            </div>
        <div>
            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" name="username" placeholder="Введите имя пользователя" required />
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Введите email" required />
        </div>
        <div>
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" placeholder="Введите пароль" required />
        </div>
        <div>
            <label for="confirmPassword">Подтвердите пароль:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Подтвердите пароль" required />
        </div>
        <div>
            <button type="submit">Зарегистрироваться</button>
        </div>
    </form>
    <div class="login-link">
        Уже есть аккаунт? <a th:href="@{/login}" class="login-button">Войдите</a>
    </div>
</div>
</body>
</html>
