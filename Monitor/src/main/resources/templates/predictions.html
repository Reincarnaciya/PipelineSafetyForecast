<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Прогнозы утечек</title>
    <style>
        .container {
            max-width: 800px;
            margin: 20px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            border: 1px solid #ddd;
        }
    </style>

    <meta name="start-time" th:content="${#temporals.format(start, 'yyyy-MM-dd HH:mm')}"/>
    <meta name="end-time" th:content="${#temporals.format(end, 'yyyy-MM-dd HH:mm')}"/>
    <script th:src="@{/scripts/chart/leak-show.js}"></script>
</head>
<body>
<div class="container">
    <h1>Прогнозы утечек</h1>
    <form method="get">
        <label>С: <input name="start" th:value="${#temporals.format(start, 'yyyy-MM-dd HH:mm')}"
                         type="datetime-local"></label>
        <label>По: <input name="end" th:value="${#temporals.format(end, 'yyyy-MM-dd HH:mm')}"
                          type="datetime-local"></label>
        <button type="submit">Показать</button>
    </form>

    <table>
        <thead>
        <tr>
            <th>Датчик</th>
            <th>Время</th>
            <th>Вероятность утечки</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${predictions}">
            <td th:text="${p.sensorId}"></td>
            <!--            <td th:text="${#temporals.format(p.timestamp, 'yyyy-MM-dd\'T\'HH:mm')}"></td>-->
            <!--<td th:text="${#numbers.formatDecimal(p.leakProbability, 1, 2)}"></td>-->
        </tr>
        </tbody>
    </table>

    <canvas height="200" id="chart" width="400"></canvas>


</div>
</body>
</html>
